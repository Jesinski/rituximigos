<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rheumatology Exams</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Exam Picker Screen -->
    <div id="picker-screen" class="screen active">
      <div class="picker-card">
        <h1>Rheumatology Exams</h1>
        <p class="subtitle">Select an exam to begin</p>
        <div id="exam-list" class="exam-list"></div>
      </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="screen">
      <div class="start-card">
        <button id="btn-back-picker" class="btn btn-small btn-outline btn-back">&larr; Back</button>
        <h1 id="exam-title"></h1>
        <p id="exam-subtitle" class="subtitle"></p>
        <div class="exam-info">
          <div><strong>Questions:</strong> <span id="exam-count"></span></div>
          <div><strong>Original date:</strong> <span id="exam-date"></span></div>
        </div>
        <button id="btn-start" class="btn btn-primary">Start Exam</button>
        <button id="btn-review" class="btn btn-secondary" style="display:none">Continue Review</button>
      </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="screen">
      <header>
        <div class="header-left">
          <span id="q-counter" class="q-counter">1 / 100</span>
        </div>
        <div class="header-center">
          <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        </div>
        <div class="header-right">
          <span id="score-display" class="score-display">0 ✓</span>
          <button id="btn-finish" class="btn btn-small btn-outline">Finish</button>
        </div>
      </header>

      <main>
        <div id="q-anulado" class="anulado-banner" style="display:none">
          Voided Question
        </div>

        <div id="q-enunciado" class="enunciado"></div>

        <div id="q-opcoes" class="opcoes"></div>

        <div id="q-feedback" class="feedback" style="display:none">
          <div id="feedback-result" class="feedback-result"></div>
          <div id="feedback-explicacao" class="feedback-explicacao"></div>
        </div>
      </main>

      <footer>
        <button id="btn-prev" class="btn btn-nav" disabled>&larr; Previous</button>
        <div class="nav-dots" id="nav-dots"></div>
        <button id="btn-next" class="btn btn-nav">Next &rarr;</button>
      </footer>
    </div>

    <!-- Results Screen -->
    <div id="results-screen" class="screen">
      <div class="results-card">
        <h1>Final Results</h1>
        <div id="results-score" class="results-score"></div>
        <div id="results-bar" class="results-bar-container">
          <div id="results-bar-fill" class="results-bar-fill"></div>
        </div>
        <div id="results-stats" class="results-stats"></div>
        <div class="results-actions">
          <button id="btn-review-results" class="btn btn-primary">Review Questions</button>
          <button id="btn-restart" class="btn btn-secondary">Restart</button>
        </div>
        <div id="results-grid" class="results-grid"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
